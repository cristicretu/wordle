    />

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="Wordle în română — ghicește cuvântul de 5 litere în 6 încercări. Cu diacritice."
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="canonical" href="https://cristicretu.github.io/wordle/" />

    <meta name="twitter:card" content="summary" />

            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Zm8.4-2.9.04-.6-.04-.6 1.42-1.1a.5.5 0 0 0 .12-.64l-1.35-2.33a.5.5 0 0 0-.6-.22l-1.67.67a6.6 6.6 0 0 0-1.04-.6l-.25-1.78a.5.5 0 0 0-.5-.43h-2.7a.5.5 0 0 0-.5.43l-.25 1.78c-.37.15-.72.35-1.05.6l-1.66-.67a.5.5 0 0 0-.6.22L6.66 7.06a.5.5 0 0 0 .12.64l1.42 1.1-.04.6.04.6-1.42 1.1a.5.5 0 0 0-.12.64l1.35 2.33c.13.22.4.31.6.22l1.67-.67c.32.25.67.45 1.04.6l.25 1.78c.04.25.25.43.5.43h2.7c.25 0 .46-.18.5-.43l.25-1.78c.37-.15.72-.35 1.05-.6l1.66.67c.22.09.48 0 .6-.22l1.35-2.33a.5.5 0 0 0-.12-.64l-1.42-1.1Z"/></svg>

        </div>
      </header>

      <main class="game" id="game">
        <div class="board-wrap">
          <div class="board" id="board" role="grid" aria-label="Tablă de joc"></div>
        </div>
        <div class="keyboard" id="keyboard"></div>

    </div>

    <div class="toaster" id="toaster" aria-live="polite" aria-atomic="true"></div>
    <div id="modal-root"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
